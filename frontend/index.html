<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Idea Journal</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <!--
      Step 3 - Frontend UI Starter
      ==============================
      WHY SEMANTIC HTML: Elements like header, main, section tell the browser
      and screen readers what each region means - better than generic divs.

      WHY data-testid: These attributes are ONLY for tests. They make
      Playwright selectors stable so tests don't break when you rename CSS.

      STUDENT TASK - build this page out step by step:
        Step 3a: Add the form (title, description, category fields)
        Step 3b: Complete app.ts to render ideas into #ideas-list
        Step 3c: Add search and filter controls
        Step 3d: Style everything in src/style.css

      Read docs/STEP_03_FRONTEND_UI.md before adding anything!
    -->

    <header class="site-header">
      <h1>Idea Journal</h1>
      <p class="subtitle">Capture your learning ideas</p>
    </header>

    <main class="container">

      <!-- Step 3a: Add your idea form here
           The form needs these data-testid attributes:
             data-testid="idea-form"          on the form element
             data-testid="input-title"        on the title input
             data-testid="input-description"  on the description textarea
             data-testid="select-category"    on the select dropdown
             data-testid="btn-submit"         on the submit button
             id="title-error"                 for validation error messages
             id="form-status"                 for success/error status
      -->
      <section class="form-section" aria-label="Add a new idea">
        <h2>Add a New Idea</h2>
        <p class="hint">
          Open <strong>docs/STEP_03_FRONTEND_UI.md</strong> and follow the
          instructions to build this form step by step.
        </p>
        <!-- TODO: Add your form here -->
      </section>

      <!-- Step 3c: Add search and filter controls here -->

      <!-- Step 3b: Ideas list - rendered by app.ts
           Each idea item should have data-testid="idea-item"
           Inside: data-testid="idea-title", "idea-category", "btn-delete"
      -->
      <section class="ideas-section" aria-label="Your ideas">
        <h2>Your Ideas</h2>
        <div id="loading" style="display:none" aria-live="polite">Loading...</div>
        <p id="empty-msg" class="empty-msg" data-testid="empty-msg">
          No ideas yet - add your first one above!
        </p>
        <ul id="ideas-list" class="ideas-list" aria-label="Ideas list"></ul>
      </section>

    </main>

    <script type="module" src="/src/app.ts"></script>
  </body>
</html>
